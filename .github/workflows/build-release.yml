name: Build and Release Spectral Library

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (semver, e.g., 1.0.0)"
        required: true
        type: string
      sources:
        description: "Comma-separated sources to include (usgs,ecostress,relab,asu_tes,bishop,ecosis or all)"
        required: false
        default: "all"
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install openspeclib
        run: pip install -e ".[build,dev]"

      - name: Run tests
        run: pytest tests/ -v

      - name: Determine sources
        id: sources
        run: |
          if [ "${{ inputs.sources }}" = "all" ]; then
            echo "list=usgs,ecostress,relab,asu_tes,bishop,ecosis" >> "$GITHUB_OUTPUT"
          else
            echo "list=${{ inputs.sources }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download source libraries
        run: |
          IFS=',' read -ra SOURCES <<< "${{ steps.sources.outputs.list }}"
          for source in "${SOURCES[@]}"; do
            source=$(echo "$source" | xargs)
            echo "::group::Downloading $source"
            openspeclib download --source "$source" --target "./raw/$source"
            echo "::endgroup::"
          done
        # Sources requiring manual download (relab, asu_tes, bishop)
        # will create empty directories and print instructions.
        # Upload pre-downloaded archives as workflow artifacts or use the
        # data_dir input to point at a pre-populated directory.

      - name: Restore manual-download sources (if cached)
        uses: actions/cache@v4
        with:
          path: |
            ./raw/ecostress
            ./raw/relab
            ./raw/asu_tes
            ./raw/bishop
            ./raw/ecosis
          key: spectral-data-manual-${{ hashFiles('src/openspeclib/loaders/*.py') }}
          restore-keys: |
            spectral-data-manual-

      - name: Ingest source libraries
        run: |
          mkdir -p processed
          IFS=',' read -ra SOURCES <<< "${{ steps.sources.outputs.list }}"
          for source in "${SOURCES[@]}"; do
            source=$(echo "$source" | xargs)
            input_dir="./raw/$source"

            # Check if the source directory has any data files
            file_count=$(find "$input_dir" -type f \( -name "*.txt" -o -name "*.csv" -o -name "*.asc" -o -name "*.tab" -o -name "*.spectrum.txt" -o -name "*.json" \) 2>/dev/null | head -1 | wc -l)
            if [ "$file_count" -eq 0 ]; then
              echo "::warning::Skipping $source — no data files found in $input_dir (manual download required)"
              continue
            fi

            echo "::group::Ingesting $source"
            openspeclib ingest --source "$source" --input "$input_dir" --output ./processed/
            echo "::endgroup::"
          done

      - name: Check for processed data
        run: |
          jsonl_count=$(find ./processed/ -name "*.jsonl" 2>/dev/null | wc -l)
          if [ "$jsonl_count" -eq 0 ]; then
            echo "::error::No sources were successfully ingested. Ensure at least one source has data available."
            exit 1
          fi
          echo "Found $jsonl_count ingested source(s)"

      - name: Combine into master library
        run: openspeclib combine --input ./processed/ --output ./library/

      - name: Validate library
        run: openspeclib validate ./library/

      - name: Package release artifacts
        run: |
          # Catalog-only package for lightweight use
          cp library/catalog.json openspeclib-catalog-${{ inputs.version }}.json

          # Collect per-source Parquet files as flat release assets. Filenames
          # are already unique by source (spectra/<source>.parquet), so no
          # renaming is needed.
          mkdir -p release-parquet
          for f in library/spectra/*.parquet; do
            cp "$f" "release-parquet/$(basename "$f")"
          done

          # Compute checksums for catalog + all parquet assets
          sha256sum openspeclib-catalog-${{ inputs.version }}.json > checksums.txt
          for f in release-parquet/*.parquet; do
            sha256sum "$f" | sed "s|release-parquet/||" >> checksums.txt
          done

      - name: Generate release notes
        id: notes
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          python - <<'PY'
          import json
          import os

          version = os.environ["RELEASE_VERSION"]
          catalog = json.load(open("library/catalog.json"))
          total = catalog["statistics"]["total_spectra"]
          sources_list = "\n".join(
              f"- **{info['name']}** (v{info['version']}): {info['spectrum_count']} spectra"
              for info in catalog["sources"].values()
          )

          parquet_assets = "\n".join(
              f"- `{name}.parquet` — {info['spectrum_count']} spectra from {info['name']}"
              for name, info in catalog["sources"].items()
              if info["spectrum_count"] > 0
          )

          notes = f"""## OpenSpecLib v{version}

          Amalgamated spectral library containing **{total} spectra** from the following sources:

          {sources_list}

          ### Artifacts

          - `openspeclib-catalog-{version}.json` — Catalog (metadata index, no spectral arrays)
          - One Parquet file per source (row-grouped for partial HTTP Range reads):
          {parquet_assets}
          - `checksums.txt` — SHA-256 checksums for all of the above

          ### Usage

          Read the catalog for metadata queries:
          ```python
          import json, urllib.request
          url = "https://github.com/<owner>/<repo>/releases/download/v{version}/openspeclib-catalog-{version}.json"
          catalog = json.load(urllib.request.urlopen(url))
          print(f"Total spectra: {{catalog['statistics']['total_spectra']}}")
          ```

          Per-source files are **Apache Parquet (zstd-compressed)** with one row per spectrum
          and dot-separated columns (e.g. `material.name`, `spectral_data.wavelengths`).
          Each source is a single file — category filtering is a column predicate, not a
          file selection. Read directly from the release URL:
          ```python
          import pyarrow.parquet as pq, pyarrow.fs as pafs
          # pyarrow supports HTTP(S) sources; reads only the row groups matching your query
          table = pq.read_table(
              "https://github.com/<owner>/<repo>/releases/download/v{version}/usgs_splib07.parquet",
              filters=[("material.category", "=", "mineral")],
          )
          ```

          Or query with DuckDB directly over HTTP (httpfs extension reads Parquet footers
          and row groups via Range requests, no full download):
          ```sql
          INSTALL httpfs; LOAD httpfs;
          SELECT id, "material.name"
          FROM 'https://github.com/<owner>/<repo>/releases/download/v{version}/usgs_splib07.parquet'
          WHERE "material.category" = 'mineral'
            AND "spectral_data.wavelength_min" < 0.4;
          ```

          See [docs/data-structure.md](docs/data-structure.md) and
          [schemas/library.parquet-schema.md](schemas/library.parquet-schema.md) for the
          full schema specification and column reference.
          """
          open("release_notes.md", "w").write(notes)
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: OpenSpecLib v${{ inputs.version }}
          body_path: release_notes.md
          files: |
            openspeclib-catalog-${{ inputs.version }}.json
            release-parquet/*.parquet
            checksums.txt
          draft: false
          prerelease: false

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v
      - run: ruff check src/ tests/
