name: Build and Release Spectral Library

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (semver, e.g., 1.0.0)"
        required: true
        type: string
      sources:
        description: "Comma-separated sources to include (usgs,ecostress,relab,asu_tes,bishop or all)"
        required: false
        default: "all"
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install openspeclib
        run: pip install -e ".[build,dev]"

      - name: Run tests
        run: pytest tests/ -v

      - name: Determine sources
        id: sources
        run: |
          if [ "${{ inputs.sources }}" = "all" ]; then
            echo "list=usgs,ecostress,relab,asu_tes,bishop" >> "$GITHUB_OUTPUT"
          else
            echo "list=${{ inputs.sources }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download source libraries
        run: |
          IFS=',' read -ra SOURCES <<< "${{ steps.sources.outputs.list }}"
          for source in "${SOURCES[@]}"; do
            source=$(echo "$source" | xargs)
            echo "::group::Downloading $source"
            openspeclib download --source "$source" --target "./raw/$source"
            echo "::endgroup::"
          done
        # Sources requiring manual download (ecostress, relab, asu_tes, bishop)
        # will create empty directories and print instructions.
        # Upload pre-downloaded archives as workflow artifacts or use the
        # data_dir input to point at a pre-populated directory.

      - name: Restore manual-download sources (if cached)
        uses: actions/cache@v4
        with:
          path: |
            ./raw/ecostress
            ./raw/relab
            ./raw/asu_tes
            ./raw/bishop
          key: spectral-data-manual-${{ hashFiles('src/openspeclib/loaders/*.py') }}
          restore-keys: |
            spectral-data-manual-

      - name: Ingest source libraries
        run: |
          mkdir -p processed
          IFS=',' read -ra SOURCES <<< "${{ steps.sources.outputs.list }}"
          for source in "${SOURCES[@]}"; do
            source=$(echo "$source" | xargs)
            input_dir="./raw/$source"

            # Check if the source directory has any data files
            file_count=$(find "$input_dir" -type f \( -name "*.txt" -o -name "*.csv" -o -name "*.asc" -o -name "*.tab" -o -name "*.spectrum.txt" \) 2>/dev/null | head -1 | wc -l)
            if [ "$file_count" -eq 0 ]; then
              echo "::warning::Skipping $source — no data files found in $input_dir (manual download required)"
              continue
            fi

            echo "::group::Ingesting $source"
            openspeclib ingest --source "$source" --input "$input_dir" --output ./processed/
            echo "::endgroup::"
          done

      - name: Check for processed data
        run: |
          jsonl_count=$(find ./processed/ -name "*.jsonl" 2>/dev/null | wc -l)
          if [ "$jsonl_count" -eq 0 ]; then
            echo "::error::No sources were successfully ingested. Ensure at least one source has data available."
            exit 1
          fi
          echo "Found $jsonl_count ingested source(s)"

      - name: Combine into master library
        run: openspeclib combine --input ./processed/ --output ./library/

      - name: Validate library
        run: openspeclib validate ./library/

      - name: Package release artifacts
        run: |
          # Full library archive
          cd library && tar -czf ../openspeclib-${{ inputs.version }}.tar.gz . && cd ..

          # Catalog-only package for lightweight use
          cp library/catalog.json openspeclib-catalog-${{ inputs.version }}.json

          # Compute checksums
          sha256sum openspeclib-${{ inputs.version }}.tar.gz > checksums.txt
          sha256sum openspeclib-catalog-${{ inputs.version }}.json >> checksums.txt

      - name: Generate release notes
        id: notes
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          python - <<'PY'
          import json
          import os

          version = os.environ["RELEASE_VERSION"]
          catalog = json.load(open("library/catalog.json"))
          total = catalog["statistics"]["total_spectra"]
          sources_list = "\n".join(
              f"- **{info['name']}** (v{info['version']}): {info['spectrum_count']} spectra"
              for info in catalog["sources"].values()
          )

          notes = f"""## OpenSpecLib v{version}

          Amalgamated spectral library containing **{total} spectra** from the following sources:

          {sources_list}

          ### Artifacts

          - `openspeclib-{version}.tar.gz` — Full library (catalog + all spectral data chunks)
          - `openspeclib-catalog-{version}.json` — Catalog only (metadata index, no spectral arrays)
          - `checksums.txt` — SHA-256 checksums

          ### Usage

          Download and extract the full library:
          ```bash
          tar -xzf openspeclib-{version}.tar.gz -C ./speclib
          ```

          Use just the catalog for lightweight metadata queries (JSON):
          ```python
          import json
          catalog = json.load(open("openspeclib-catalog-{version}.json"))
          print(f"Total spectra: {{catalog['statistics']['total_spectra']}}")
          ```

          Library chunks are **Apache Parquet (zstd-compressed)** with one row per spectrum
          and dot-separated columns (e.g. `material.name`, `spectral_data.wavelengths`).
          Read them directly with pyarrow:
          ```python
          import pyarrow.parquet as pq
          table = pq.read_table("speclib/spectra/usgs_splib07/mineral.parquet")
          print(table.schema)
          ```

          Or query across chunks with DuckDB without loading anything into Python:
          ```sql
          SELECT id, "material.name"
          FROM 'speclib/spectra/**/*.parquet'
          WHERE "spectral_data.wavelength_min" < 0.4;
          ```

          See [docs/data-structure.md](docs/data-structure.md) and
          [schemas/library.parquet-schema.md](schemas/library.parquet-schema.md) for the
          full schema specification and column reference.
          """
          open("release_notes.md", "w").write(notes)
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: OpenSpecLib v${{ inputs.version }}
          body_path: release_notes.md
          files: |
            openspeclib-${{ inputs.version }}.tar.gz
            openspeclib-catalog-${{ inputs.version }}.json
            checksums.txt
          draft: false
          prerelease: false

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v
      - run: ruff check src/ tests/
