name: Deploy Viewer to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'viewer/**'
      - '.github/workflows/deploy-viewer.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: viewer/package-lock.json

      - name: Install dependencies
        working-directory: viewer
        run: npm ci

      - name: Download release data
        working-directory: viewer/public/data
        run: |
          gh release download v0.0.4 \
            --repo null-jones/openspeclib \
            --pattern "*.json" \
            --pattern "*.parquet" \
            --skip-existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy DuckDB WASM files
        working-directory: viewer
        run: |
          mkdir -p public/duckdb
          cp node_modules/@duckdb/duckdb-wasm/dist/duckdb-mvp.wasm public/duckdb/
          cp node_modules/@duckdb/duckdb-wasm/dist/duckdb-browser-mvp.worker.js public/duckdb/
          cp node_modules/@duckdb/duckdb-wasm/dist/duckdb-eh.wasm public/duckdb/
          cp node_modules/@duckdb/duckdb-wasm/dist/duckdb-browser-eh.worker.js public/duckdb/

      - name: Build
        working-directory: viewer
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: viewer/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
